<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Destructuring spread operator function ....rest</title>
</head>

<body>
    <h1></h1>
    <p></p>
    <script>
       // Array Object
        let obj = [{ id:1,name:"Harry",age:30},{ id:2,name:"Backam",age:23}];
        // Destructuring 
        let {name , age} = obj[0];
        document.querySelector('p').textContent = `${name} ${age}`;
        
        // Spread 
        let d1 = [1,2,3];
        let d2 = [3,4,5];
        let data = [...d1,...d2] ;
        document.write('<p>'+ data +'</p>');

        // spread rest
          let data1 = ["one","two","three","four"]; 
        function rest (frist,...rest){ 
           
            return rest;
        }
        document.write(rest(data1[0],...data1));
    </script>
</body>
</html>
