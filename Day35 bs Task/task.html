<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task</title>
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-sm border">
        <div class="container-fluid">
             <a class="bi bi-triangle-half navbar-brand" href="#">GP </a>
             <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#div1"><span class="navbar-toggler-icon"></span></button>
             <div class="collapse navbar-collapse" id="div1">
                 <ul class="navbar-nav ms-auto">
                       <li class="nav-item"><a  class="nav-link" href="#"> Home</a></li>
                       <li class="nav-item"><a  class="nav-link" href="#"> About</a></li>
                       <li class="nav-item"><a  class="nav-link" href="#"> Contact</a></li>
                 </ul>                 
             </div>
        </div>
    </nav>



    <button class=" btn btn-primary m-5 " data-bs-toggle="modal" data-bs-target="#dis"> Alert Box</button>
    <div class="modal" id="dis">
        <div class="modal-dialog">
           <div class="modal-content">
              <div class="modal-header">
                  <h3> Alert Massage</h3>
              </div>
             <div class="modal-body">
                 <p> File is runing in another folder </p>
             </div>
             <div class="modal-footer">
                  <button class="btn btn-secondary" data-bs-dismiss="modal" > Cancel</button>
                  <button class="btn btn-danger" data-bs-dismiss="modal" > Delete </button>
             </div>
         </div>
        </div>
    </div>



    <div class="row justify-content-center">
        <div class="col-md-4">
            <from action="#" method="post">
                <div class="mb-2">
                    <label for="name" class="form-label"> Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>
                 <div class="mb-3">
                    <label for="email" class="form-label"> Email</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label"> Messsage Field</label>
                    <textarea id="message" class="form-control" placeholder="How can we Help!"></textarea>
                </div>
                <div >
                    <input type="submit" class="btn btn-success" >
                </div>
            </from>
        </div>
    </div>

</body>
</html>
