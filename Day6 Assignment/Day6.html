<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <form action="Validation.html" >
        <label for="sname"> Student Name</label><br>
        <input type="text" id="sname" placeholder="Enter a Name" required><br><br>
        <label for="password"> Password</label><br>
        <input type="password" id="password" placeholder="Enter a Password" minlength="8" required><br> <br>
        <label for="email"> Email</label><br>
        <input type="email" id="email" required><br><br>
        <lable for="gender"> Gender</lable>
        <input  type="radio"class="gender"><label>Male</label>
        <input type="radio"    class="gender"><label>Female</label><br><br>
        <label >  Hobbies Are</label><br>
        <input type="checkbox" ><label> Bike Travel</label> <br>
        <input type="checkbox"><label> Play Football</label> <br>
        <input type="checkbox"><label> read book</label> <br><br>
        <label for="age"> Age</label>
        <input type="number" id="age"min="18" max="54" required><br><br>
        <lable for="mobileno">Mobile</lable>
        <input type="tel" id="mobileno" pattern="[0-9]{10}" maxlength="10"><br><br>
        <input type="submit">
    </form>
</body>
</html>
